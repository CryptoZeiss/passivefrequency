<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Passive Frequency</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inconsolata:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #000000;
      --white: #ffffff;
      --dim: rgba(255,255,255,0.15);
      --mid: rgba(255,255,255,0.45);
      --accent: rgba(255,255,255,0.07);
    }

    html, body {
      background: var(--black);
      color: var(--white);
      font-family: 'Inconsolata', monospace;
      font-weight: 300;
      min-height: 100vh;
      cursor: crosshair;
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 2.5rem 3rem 1.5rem;
      background: linear-gradient(to bottom, #000 60%, transparent);
    }

    .site-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(1.1rem, 2vw, 1.4rem);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--white);
    }

    .site-title span {
      font-style: italic;
      font-weight: 300;
      opacity: 0.6;
      margin-right: 0.5em;
    }

    .header-meta {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dim);
      text-align: right;
      line-height: 1.8;
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 0.25rem;
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 0.5rem;
      backdrop-filter: blur(12px);
    }

    .filter-btn {
      background: none;
      border: none;
      color: var(--dim);
      font-family: 'Inconsolata', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.5rem 1.2rem;
      cursor: crosshair;
      transition: color 0.3s, background 0.3s;
    }

    .filter-btn:hover,
    .filter-btn.active {
      color: var(--white);
      background: rgba(255,255,255,0.07);
    }

    /* ── GRID ── */
    .gallery {
      padding: 8rem 2rem 8rem;
      columns: 3 320px;
      column-gap: 2px;
    }

    .gallery-item {
      break-inside: avoid;
      position: relative;
      margin-bottom: 2px;
      overflow: hidden;
      cursor: crosshair;
    }

    .gallery-item img {
      display: block;
      width: 100%;
      height: auto;
      filter: brightness(0.85);
      transition: filter 0.6s ease, transform 0.8s ease;
    }

    /* Show left half as preview (right half is for other eye) */
    .gallery-item img {
      object-fit: cover;
    }

    .gallery-item:hover img {
      filter: brightness(1);
      transform: scale(1.015);
    }

    /* ── ITEM OVERLAY ── */
    .item-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.5s ease;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1.5rem;
    }

    .gallery-item:hover .item-overlay {
      opacity: 1;
    }

    .item-title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: 1rem;
      letter-spacing: 0.05em;
      color: var(--white);
      margin-bottom: 0.3rem;
    }

    .item-category {
      font-size: 0.55rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--mid);
    }

    .vr-badge {
      position: absolute;
      top: 1rem;
      right: 1rem;
      font-size: 0.5rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dim);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 0.3rem 0.6rem;
      opacity: 0;
      transition: opacity 0.5s;
    }

    .gallery-item:hover .vr-badge {
      opacity: 1;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      color: var(--dim);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .empty-state.visible {
      display: flex;
    }

    /* ── PAGE LOAD ANIMATION ── */
    .gallery-item {
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    header {
      opacity: 0;
      animation: fadeIn 1.2s ease 0.2s forwards;
    }

    .filter-bar {
      opacity: 0;
      animation: fadeIn 1s ease 0.5s forwards;
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 2px; }
    ::-webkit-scrollbar-track { background: var(--black); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); }
  </style>
</head>
<body>

  <header>
    <div class="site-title">
      <span>A</span>Passive Frequency
    </div>
    <div class="header-meta">
      Stereoscopic VR Series<br>
      Shane — RMIT University
    </div>
  </header>

  <main class="gallery" id="gallery"></main>

  <div class="empty-state" id="emptyState">
    No images in this category
  </div>

  <nav class="filter-bar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="Listeners">Listeners</button>
    <button class="filter-btn" data-filter="Signalers">Signalers</button>
    <button class="filter-btn" data-filter="Watchers">Watchers</button>
  </nav>

  <script>
    // ─────────────────────────────────────────────────
    // IMAGE MANIFEST
    // Add your images here. Drop files into the images/
    // folder and add one entry per image below.
    //
    // src:      path relative to index.html
    // title:    displayed on hover
    // category: Listeners | Signalers | Watchers
    // ─────────────────────────────────────────────────
  const images = [
  { src: 'images/Stereo_Checkpoint WebXR.jpg', title: 'Checkpoint', category: 'Watchers' },
  { src: 'images/Stereo_HK-9 Warehoused WebXR.jpg', title: 'HK-9 Warehoused', category: 'Watchers' },
  { src: 'images/Stereo_Mountain Parabola WebXR.jpg', title: 'Mountain Parabola', category: 'Listeners' },
  { src: 'images/Stereo_Steppes Lookout WebXR.jpg', title: 'Steppes Lookout', category: 'Watchers' },
];

    // ─────────────────────────────────────────────────
    // RENDER
    // ─────────────────────────────────────────────────
    const gallery = document.getElementById('gallery');
    const emptyState = document.getElementById('emptyState');
    let currentFilter = 'all';

    function render(filter) {
      gallery.innerHTML = '';
      const filtered = filter === 'all' ? images : images.filter(i => i.category === filter);

      if (filtered.length === 0) {
        emptyState.classList.add('visible');
        return;
      }
      emptyState.classList.remove('visible');

      filtered.forEach((img, index) => {
        const item = document.createElement('div');
        item.className = 'gallery-item';
        item.style.animationDelay = `${index * 0.07}s`;

        // For SBS images, we show only the left half as the thumbnail preview
        // The full SBS image is passed to the viewer for stereoscopic display
        item.innerHTML = `
          <img src="${img.src}" alt="${img.title}" loading="lazy">
          <div class="item-overlay">
            <div class="item-title">${img.title}</div>
            <div class="item-category">${img.category}</div>
          </div>
          <div class="vr-badge">View in VR</div>
        `;

        item.addEventListener('click', () => {
          const encodedSrc = encodeURIComponent(img.src);
          const encodedTitle = encodeURIComponent(img.title);
          window.location.href = `viewer.html?img=${encodedSrc}&title=${encodedTitle}`;
        });

        gallery.appendChild(item);
      });
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render(currentFilter);
      });
    });

    render('all');
  </script>
</body>
</html>
