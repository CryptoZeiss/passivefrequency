<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Passive Frequency — Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Inconsolata:wght@300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #000;
      color: #fff;
      font-family: 'Inconsolata', monospace;
      font-weight: 300;
      height: 100%;
      overflow: hidden;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── UI OVERLAY ── */
    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* Back button */
    #back {
      position: fixed;
      top: 2rem;
      left: 2.5rem;
      pointer-events: all;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      opacity: 0.5;
      transition: opacity 0.3s;
      text-decoration: none;
      color: #fff;
    }

    #back:hover { opacity: 1; }

    #back .arrow {
      width: 24px;
      height: 1px;
      background: #fff;
      position: relative;
    }

    #back .arrow::before {
      content: '';
      position: absolute;
      left: 0; top: -4px;
      width: 8px; height: 8px;
      border-left: 1px solid #fff;
      border-bottom: 1px solid #fff;
      transform: rotate(45deg);
    }

    #back span {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    /* Title */
    #image-title {
      position: fixed;
      bottom: 2rem;
      left: 2.5rem;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 1.1rem;
      opacity: 0.5;
      letter-spacing: 0.05em;
    }

    /* VR launch button */
    #vr-btn {
      position: fixed;
      bottom: 2rem;
      right: 2.5rem;
      pointer-events: all;
      cursor: pointer;
      background: none;
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      font-family: 'Inconsolata', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.75rem 1.5rem;
      transition: border-color 0.3s, background 0.3s;
    }

    #vr-btn:hover {
      border-color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.05);
    }

    #vr-btn:disabled {
      opacity: 0.2;
      cursor: not-allowed;
    }

    /* Loading state */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      background: #000;
      z-index: 20;
      transition: opacity 0.6s;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-text {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }

    /* Error state */
    #error {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
      z-index: 20;
    }

    #error.visible { display: flex; }

    #error p {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }

    /* Flat preview hint */
    #preview-hint {
      position: fixed;
      top: 2rem;
      right: 2.5rem;
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      text-align: right;
      line-height: 1.8;
    }
  </style>
</head>
<body>

  <div id="loading">
    <div class="loading-text">Loading image</div>
  </div>

  <div id="error">
    <p>Image could not be loaded</p>
    <a href="index.html" style="color:rgba(255,255,255,0.3);font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;">Return to gallery</a>
  </div>

  <div id="canvas-container"></div>

  <div id="ui">
    <a href="index.html" id="back">
      <div class="arrow"></div>
      <span>Gallery</span>
    </a>
    <div id="image-title"></div>
    <div id="preview-hint">Flat preview<br>Open in VR headset<br>for stereoscopic view</div>
    <button id="vr-btn" disabled>Enter VR</button>
  </div>

  <!-- Three.js r128 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
    // ─────────────────────────────────────────────────
    // PARSE URL PARAMS
    // ─────────────────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const imgSrc = params.get('img');
    const imgTitle = params.get('title') || '';

    document.getElementById('image-title').textContent = imgTitle
      ? decodeURIComponent(imgTitle)
      : '';

    if (!imgSrc) {
      document.getElementById('error').classList.add('visible');
      document.getElementById('loading').classList.add('hidden');
    }

    // ─────────────────────────────────────────────────
    // THREE.JS SETUP
    // ─────────────────────────────────────────────────
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.position.set(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    container.appendChild(renderer.domElement);

    // ─────────────────────────────────────────────────
    // LOAD SBS IMAGE & BUILD SCENE
    // ─────────────────────────────────────────────────
    function buildScene(texture) {
      texture.minFilter = THREE.LinearFilter;
      texture.magFilter = THREE.LinearFilter;

      // SBS image: left half = left eye, right half = right eye
      // We place a plane in front of the camera for each eye
      // using texture UV offsets to show the correct half

      const aspect = texture.image.width / 2 / texture.image.height;
      const planeWidth = 4;
      const planeHeight = planeWidth / aspect;
      const dist = 2; // distance from viewer in metres

      const geometry = new THREE.PlaneGeometry(planeWidth, planeHeight);

      // Left eye: UV x from 0 to 0.5
      const leftTexture = texture.clone();
      leftTexture.needsUpdate = true;
      leftTexture.repeat.set(0.5, 1);
      leftTexture.offset.set(0, 0);
      const leftMat = new THREE.MeshBasicMaterial({ map: leftTexture });
      const leftMesh = new THREE.Mesh(geometry, leftMat);
      leftMesh.position.set(0, 0, -dist);
      leftMesh.layers.set(1); // left eye layer

      // Right eye: UV x from 0.5 to 1
      const rightTexture = texture.clone();
      rightTexture.needsUpdate = true;
      rightTexture.repeat.set(0.5, 1);
      rightTexture.offset.set(0.5, 0);
      const rightMat = new THREE.MeshBasicMaterial({ map: rightTexture });
      const rightMesh = new THREE.Mesh(geometry, rightMat);
      rightMesh.position.set(0, 0, -dist);
      rightMesh.layers.set(2); // right eye layer

      // Flat preview plane (layer 0) — shows left half on desktop
      const previewTexture = texture.clone();
      previewTexture.needsUpdate = true;
      previewTexture.repeat.set(0.5, 1);
      previewTexture.offset.set(0, 0);
      const previewMat = new THREE.MeshBasicMaterial({ map: previewTexture });
      const previewMesh = new THREE.Mesh(geometry, previewMat);
      previewMesh.position.set(0, 0, -dist);
      previewMesh.layers.set(0); // default layer, visible outside VR

      scene.add(leftMesh, rightMesh, previewMesh);

      // Hide loading
      document.getElementById('loading').classList.add('hidden');
    }

    // ─────────────────────────────────────────────────
    // XR CAMERA LAYER CONFIGURATION
    // Called once the VR session starts so each eye
    // camera only sees its own layer
    // ─────────────────────────────────────────────────
    renderer.xr.addEventListener('sessionstart', () => {
      const xrCamera = renderer.xr.getCamera();
      if (xrCamera.cameras && xrCamera.cameras.length >= 2) {
        // Left eye: sees layer 1 only
        xrCamera.cameras[0].layers.disableAll();
        xrCamera.cameras[0].layers.enable(1);

        // Right eye: sees layer 2 only
        xrCamera.cameras[1].layers.disableAll();
        xrCamera.cameras[1].layers.enable(2);
      }
      // Hide flat UI elements in VR
      document.getElementById('ui').style.display = 'none';
      document.getElementById('preview-hint').style.display = 'none';
    });

    renderer.xr.addEventListener('sessionend', () => {
      // Restore eye cameras to defaults when leaving VR
      const xrCamera = renderer.xr.getCamera();
      if (xrCamera.cameras && xrCamera.cameras.length >= 2) {
        xrCamera.cameras[0].layers.enableAll();
        xrCamera.cameras[1].layers.enableAll();
      }
      document.getElementById('ui').style.display = '';
    });

    // ─────────────────────────────────────────────────
    // VR BUTTON
    // ─────────────────────────────────────────────────
    const vrBtn = document.getElementById('vr-btn');

    async function checkVRSupport() {
      if (navigator.xr) {
        const supported = await navigator.xr.isSessionSupported('immersive-vr');
        if (supported) {
          vrBtn.disabled = false;
          vrBtn.addEventListener('click', enterVR);
        }
      }
    }

    async function enterVR() {
      try {
        const session = await navigator.xr.requestSession('immersive-vr', {
          optionalFeatures: ['local-floor', 'bounded-floor']
        });
        renderer.xr.setSession(session);
        vrBtn.textContent = 'Exit VR';
        vrBtn.removeEventListener('click', enterVR);
        vrBtn.addEventListener('click', () => session.end());

        session.addEventListener('end', () => {
          vrBtn.textContent = 'Enter VR';
          vrBtn.removeEventListener('click', () => session.end());
          vrBtn.addEventListener('click', enterVR);
        });
      } catch (err) {
        console.error('VR session error:', err);
      }
    }

    checkVRSupport();

    // ─────────────────────────────────────────────────
    // TEXTURE LOAD
    // ─────────────────────────────────────────────────
    if (imgSrc) {
      const loader = new THREE.TextureLoader();
      loader.load(
        decodeURIComponent(imgSrc),
        (texture) => buildScene(texture),
        undefined,
        () => {
          document.getElementById('error').classList.add('visible');
          document.getElementById('loading').classList.add('hidden');
        }
      );
    }

    // ─────────────────────────────────────────────────
    // RENDER LOOP
    // ─────────────────────────────────────────────────
    renderer.setAnimationLoop(() => {
      renderer.render(scene, camera);
    });

    // ─────────────────────────────────────────────────
    // RESIZE
    // ─────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
