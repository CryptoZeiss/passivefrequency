<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Passive Frequency — Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Inconsolata:wght@300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    html, body {
      background: #000;
      color: #fff;
      font-family: 'Inconsolata', monospace;
      font-weight: 300;
      height: 100%;
      overflow: hidden;
    }
 
    #canvas-container { position: fixed; inset: 0; }
    canvas { display: block; width: 100% !important; height: 100% !important; }
 
    #back {
      position: fixed; top: 2rem; left: 2.5rem; z-index: 10;
      display: flex; align-items: center; gap: 0.75rem;
      opacity: 0.5; transition: opacity 0.3s;
      text-decoration: none; color: #fff; cursor: pointer;
    }
    #back:hover { opacity: 1; }
    #back .arrow { width: 24px; height: 1px; background: #fff; position: relative; }
    #back .arrow::before {
      content: ''; position: absolute; left: 0; top: -4px;
      width: 8px; height: 8px;
      border-left: 1px solid #fff; border-bottom: 1px solid #fff;
      transform: rotate(45deg);
    }
    #back span { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; }
 
    #image-title {
      position: fixed; bottom: 2.5rem; left: 2.5rem; z-index: 10;
      font-family: 'Cormorant Garamond', serif; font-style: italic;
      font-weight: 300; font-size: 1.1rem; opacity: 0.5; letter-spacing: 0.05em;
    }
 
    #vr-btn {
      position: fixed; bottom: 2rem; right: 2.5rem; z-index: 10;
      cursor: pointer;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.6);
      color: #fff;
      font-family: 'Inconsolata', monospace; font-size: 0.7rem;
      font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase;
      padding: 0.9rem 2rem;
      transition: background 0.3s, border-color 0.3s;
    }
    #vr-btn:hover:not(:disabled) { background: rgba(255,255,255,0.22); border-color: #fff; }
    #vr-btn:disabled { opacity: 0.2; cursor: not-allowed; }
 
    #hint {
      position: fixed; top: 2rem; right: 2.5rem; z-index: 10;
      font-size: 0.55rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: rgba(255,255,255,0.25); text-align: right; line-height: 2;
    }
 
    #loading {
      position: fixed; inset: 0; display: flex;
      align-items: center; justify-content: center;
      background: #000; z-index: 20; transition: opacity 0.8s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .loading-text {
      font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase;
      color: rgba(255,255,255,0.3); animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:0.8} }
 
    #error {
      display: none; position: fixed; inset: 0;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 1.5rem; z-index: 20;
    }
    #error.visible { display: flex; }
    #error p { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.35); }
    #error a { color: rgba(255,255,255,0.35); font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; }
  </style>
</head>
<body>
 
  <div id="loading"><div class="loading-text">Loading</div></div>
  <div id="error">
    <p>Image could not be loaded</p>
    <a href="index.html">Return to gallery</a>
  </div>
 
  <div id="canvas-container"></div>
 
  <a href="index.html" id="back"><div class="arrow"></div><span>Gallery</span></a>
  <div id="image-title"></div>
  <div id="hint">Flat preview — left eye<br>Open in Quest browser<br>for stereoscopic VR</div>
  <button id="vr-btn" disabled>Enter VR</button>
 
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
 
    // ── URL PARAMS ────────────────────────────────────
    const params   = new URLSearchParams(window.location.search);
    const imgSrc   = params.get('img');
    const imgTitle = params.get('title') || '';
    if (imgTitle) document.getElementById('image-title').textContent = decodeURIComponent(imgTitle);
    if (!imgSrc) {
      document.getElementById('error').classList.add('visible');
      document.getElementById('loading').classList.add('hidden');
    }
 
    // ── THREE.JS ──────────────────────────────────────
    const container = document.getElementById('canvas-container');
    const scene     = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
 
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.position.set(0, 0, 0);
 
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    container.appendChild(renderer.domElement);
 
    // ── SCENE BUILD ───────────────────────────────────
    let sbsTexture = null;
    let inVR = false;
 
    function buildScene(texture) {
      sbsTexture = texture;
      texture.minFilter = THREE.LinearFilter;
      texture.magFilter = THREE.LinearFilter;
 
      // Default: show left half (flat Mac preview)
      texture.repeat.set(0.5, 1);
      texture.offset.set(0, 0);
      texture.needsUpdate = true;
 
      // Plane sized to per-eye aspect ratio
      const eyeAspect   = (texture.image.width / 2) / texture.image.height;
      const planeHeight = 2.8;
      const planeWidth  = planeHeight * eyeAspect;
 
      const geo  = new THREE.PlaneGeometry(planeWidth, planeHeight);
      const mat  = new THREE.MeshBasicMaterial({ map: texture });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(0, 0, -2.0);
 
      // ── PER-EYE UV SWITCHING ─────────────────────
      // onBeforeRender fires separately for each eye in WebXR.
      // We check which sub-camera is rendering and offset UVs.
      mesh.onBeforeRender = function(rend, sc, cam) {
        if (!inVR) return;
        const xrCam = rend.xr.getCamera();
        if (!xrCam.cameras || xrCam.cameras.length < 2) return;
 
        if (cam === xrCam.cameras[1]) {
          // Right eye → right half of SBS
          texture.offset.set(0.5, 0);
        } else {
          // Left eye → left half of SBS
          texture.offset.set(0, 0);
        }
        texture.needsUpdate = true;
      };
 
      scene.add(mesh);
      document.getElementById('loading').classList.add('hidden');
    }
 
    // ── VR BUTTON ─────────────────────────────────────
    const vrBtn = document.getElementById('vr-btn');
 
    async function checkVRSupport() {
      if (!navigator.xr) return;
      try {
        const ok = await navigator.xr.isSessionSupported('immersive-vr');
        if (ok) { vrBtn.disabled = false; vrBtn.addEventListener('click', enterVR); }
      } catch(e) {}
    }
 
    async function enterVR() {
      try {
        const session = await navigator.xr.requestSession('immersive-vr', {
          optionalFeatures: ['local-floor', 'bounded-floor']
        });
        renderer.xr.setSession(session);
        inVR = true;
 
        // Hide 2D UI in headset
        ['back','hint','image-title'].forEach(id => document.getElementById(id).style.display = 'none');
        vrBtn.textContent = 'Exit VR';
        vrBtn.onclick = () => session.end();
 
        session.addEventListener('end', () => {
          inVR = false;
          if (sbsTexture) { sbsTexture.offset.set(0,0); sbsTexture.needsUpdate = true; }
          ['back','hint','image-title'].forEach(id => document.getElementById(id).style.display = '');
          vrBtn.textContent = 'Enter VR';
          vrBtn.onclick = enterVR;
        });
 
      } catch(err) { console.error('VR error:', err); }
    }
 
    checkVRSupport();
 
    // ── LOAD TEXTURE ──────────────────────────────────
    if (imgSrc) {
      new THREE.TextureLoader().load(
        decodeURIComponent(imgSrc),
        tex  => buildScene(tex),
        undefined,
        ()   => {
          document.getElementById('error').classList.add('visible');
          document.getElementById('loading').classList.add('hidden');
        }
      );
    }
 
    // ── RENDER LOOP ───────────────────────────────────
    renderer.setAnimationLoop(() => renderer.render(scene, camera));
 
    // ── RESIZE ────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
 
  </script>
</body>
</html>
